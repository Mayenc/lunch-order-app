<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt Cơm Trưa - NCG</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<link href="style_user.css" rel="stylesheet"/>
</head>
<body>
<div class="container" style="padding-top: 5px !important;">

  <div class="header">
    <span class="icon">🍱</span>
    <h1>Đặt Cơm Trưa</h1>
    <p>Đặt món nhanh · Không bỏ bữa · Ăn ngon mỗi ngày</p>
  </div>

  <!-- Deadline Banner -->
  <div class="deadline-banner">
    <div class="dl-left">
      <span class="dl-label">⏰ Deadline hôm nay: </span>
      <span type="time" class="deadline-input" id="deadlineInput">08:50</span>
    </div>
    <div class="dl-right">
      <span class="countdown" id="countdown"></span>
      <div class="deadline-status open" id="deadlineStatus">
        <span class="dl-dot"></span>
        <span id="deadlineLabel">Đang mở</span>
      </div>
    </div>
  </div>

  <!-- Order Form -->
  <div class="card">
    <div class="card-title">🛒 Đặt món</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Tên người đặt</label>
        <select id="nameSelect">
          <option value="">— Chọn tên —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Món ăn</label>
        <select id="foodSelect">
          <option value="">— Chọn món —</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Ghi chú</label>
        <input type="text" id="noteInput" placeholder="VD: ít cay, không hành, thêm rau...">
      </div>
    </div>
    <button class="btn-order" id="btnOrder" onclick="placeOrder()">Đặt ngay</button>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title">📋 Lịch sử đặt món</div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('today',this)">Hôm nay</button>
      <button class="filter-btn" onclick="setFilter('week',this)">Tuần này</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="order-list" id="orderList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <p>Bạn có chắc muốn xóa đơn này?</p>
    <div class="modal-actions">
      <button onclick="confirmYes()">✔️ Đồng ý</button>
      <button onclick="confirmNo()">❌ Hủy</button>
    </div>
  </div>
</div>
<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">Đang xử lý...</div>
  </div>
</div>
<script src="app_user.js"></script>
</body>
</html>
