<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Bữa trưa - NCG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body data-page="user">

<div class="phone">

<header>
<div class="logo">🍱 Đặt cơm trưa</div>
</header>

<section>
<div class="titleRow">
<div id="deadlineText" class="deadlineText" style="font-size: 15px;"></div>
</div>


<div class="card">

<label style="font-weight: bold;">Tên <span style="color: red;">(*)</span></label>
<select id="name"></select>

<label style="font-weight: bold;">Chọn món ăn <span style="color: red;">(*)</span></label>
<select id="dishSelect"></select>

<label style="font-weight: bold;">Lưu ý</label>
<input id="note" placeholder="Lưu ý cho món ăn">

<button id="orderBtn" style="width: 100%;">Đặt cơm</button>

</div>
<div style="display: flex; align-items: center; justify-content: space-between;">
    <h3 style="margin: 0;">Lịch sử đã đặt</h3>

    <div class="custom-select">
        <select id="filterDate">
            <option value="">loading...</option>
        </select>
    </div>
</div>


<div id="myHistory" class="historyBox"></div>

</div>
<div class="menuCard" style="display: none;">
<img id="menuImg">
</div>
</section>

</div>

<div id="overlay" class="overlay hidden">
<div class="overlayBox">
<h2 id="overlayText"></h2>
</div>
</div>
<div id="loadingOverlay">
    <div>
        <div class="spinner"></div>
        <p>Đang tải dữ liệu...</p>
    </div>
</div>
<script src="app.js"></script>
<script>
    document.addEventListener("DOMContentLoaded",async () => {
        // await loadConfig()
        // await loadUsers()
        // await loadMenuFromSheet()

        // renderDateFilter()
        // readSheet()
        try {
            showLoading()

            await Promise.all([
                loadConfig(),
                loadUsers(),
                loadMenuFromSheet()
            ])

            renderDateFilter()
            readSheet() 

        } catch (err) {
            console.error("Load lỗi:", err)
        } finally {
            hideLoading()
        }
    })
    function showLoading() {
        document.getElementById("loadingOverlay").style.display = "flex"
    }

    function hideLoading() {
        document.getElementById("loadingOverlay").style.display = "none"
    }
    document.getElementById("name").addEventListener("change", function(){

        localStorage.setItem("selectedUser", this.value)

        renderMyHistory() 
    })
</script>
</body>
</html>
